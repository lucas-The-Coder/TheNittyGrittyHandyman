<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="The Nitty Gritty Handyman - Professional handyman, custom steelwork, fencing, and repair services in Johannesburg and Gauteng. Free quotes, reliable service, no job too small.">
    <title>The Nitty Gritty Handyman | Professional Services Johannesburg & Gauteng</title>
    <!-- Google Material Icons & Font Awesome (for value props only, per previous design) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ---------- DESIGN SYSTEM (BLUE ACCENTS - LIGHT & DARK BLUE) ---------- */
        :root {
            --text-color: #6b6375;
            --heading-color: #08060d;
            --bg-color: #ffffff;
            --border-color: #e5e4e7;
            --code-bg: #f4f3ec;
            --accent: #3b82f6;
            --accent-dark: #1e3a8a;
            --accent-bg: #3b82f61a;
            --accent-border: #3b82f680;
            --social-bg: #f4f3ec80;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #9ca3af;
                --heading-color: #f3f4f6;
                --bg-color: #16171d;
                --border-color: #2e303a;
                --code-bg: #1f2028;
                --accent: #60a5fa;
                --accent-dark: #1e40af;
                --accent-bg: #60a5fa26;
                --accent-border: #60a5fa80;
                --social-bg: #2f303a80;
                --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            font-size: 18px;
            line-height: 145%;
            letter-spacing: 0.18px;
            text-rendering: optimizelegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-synthesis: none;
        }

        #root {
            display: flex;
            flex-direction: column;
            text-align: center;
            width: 1126px;
            max-width: 100%;
            min-height: 100svh;
            margin: 0 auto;
            border-inline: 1px solid transparent;
            box-sizing: border-box;
            background-color: var(--bg-color);
        }

        .app-content {
            text-align: left;
            flex: 1;
            padding: 1.5rem 2rem 2.5rem;
        }

        @media (max-width: 1024px) {
            body { font-size: 16px; }
            .app-content { padding: 1.25rem 1.5rem 2rem; }
        }

        h1 {
            font-size: 56px;
            letter-spacing: -1.68px;
            margin: 32px 0 20px;
            font-weight: 700;
            color: var(--heading-color);
            line-height: 1.1;
        }
        h2 {
            font-size: 24px;
            letter-spacing: -0.24px;
            margin: 0 0 8px;
            line-height: 118%;
            font-weight: 600;
            color: var(--heading-color);
        }
        h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--heading-color);
        }
        p { margin-bottom: 1rem; }
        a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
        a:hover { opacity: 0.8; }

        button, .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        button:hover, .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(59,130,246,0.25);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
            padding: 1.5rem 2rem 0.5rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }
        .nav-link {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.5rem 0;
            cursor: pointer;
            color: var(--text-color);
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 2px solid transparent;
        }
        .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
        .nav-link:hover { color: var(--accent); }

        .grid-2, .grid-3 {
            display: grid;
            gap: 2rem;
            margin: 2rem 0;
        }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        .card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 1.8rem;
            transition: all 0.2s ease;
            box-shadow: var(--card-shadow);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-border); }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        .service-list {
            list-style: none;
            padding-left: 0;
            margin-top: 1rem;
        }
        .service-list li {
            padding: 0.3rem 0;
            padding-left: 1.2rem;
            position: relative;
        }
        .service-list li::before {
            content: "▹";
            color: var(--accent);
            position: absolute;
            left: 0;
        }

        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin: 1rem 0;
        }
        .badge {
            background: var(--accent-bg);
            border: 1px solid var(--accent-border);
            color: var(--accent);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge .material-icons { font-size: 16px; }

        .value-prop-card { text-align: center; }
        .value-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            display: inline-block;
        }
        .value-prop-card h3 { margin-top: 0.5rem; margin-bottom: 0.75rem; }
        .value-prop-card p { margin-top: 0.5rem; }

        .contact-info {
            background: var(--code-bg);
            border-radius: 20px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }
        input, textarea {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 0.9rem 1.2rem;
            font-family: inherit;
            font-size: 1rem;
            color: var(--heading-color);
            transition: 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-bg);
        }
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
            font-size: 0.85rem;
            background: var(--bg-color);
        }
        .hero-section { text-align: center; margin-bottom: 2rem; }
        .section-title { text-align: center; margin-bottom: 2rem; }
        .inline-highlight { color: var(--accent); font-weight: 600; }

        @media (max-width: 680px) {
            .nav-bar { gap: 1.2rem; padding: 1rem 1rem 0.5rem; }
            h1 { font-size: 36px; margin: 20px 0; }
            h2 { font-size: 20px; }
            .card { padding: 1.2rem; }
            .app-content { padding: 1rem 1.2rem 1.8rem; }
            .value-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        }
        /* Utility for inline material icons */
        .inline-icon {
            font-size: 1.2rem;
            vertical-align: middle;
            margin-right: 4px;
        }
        button .material-icons { font-size: 1.2rem; }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    // ---------- DATA (all emojis replaced by Google Material Icons names) ----------
    const servicesData = [
        {
            id: 1,
            title: "General Maintenance & Repairs",
            icon: "build",  // material icon
            description: "Indoor & outdoor maintenance for homes and offices  from leaky taps to broken doors, we handle it all.",
            details: ["Plumbing repairs", "Doors & Windows work", "Tiling services", "Painting services"],
            tagline: "From leaky taps to broken doors, we handle it all"
        },
        {
            id: 2,
            title: "Custom Steel & Stainless Steel Work",
            icon: "handyman",
            description: "Precision fabrication & custom metalwork built to your specifications. Bespoke projects with expert welding.",
            details: ["Fabrication", "Welding", "Stainless Steel work", "Custom Builds (staircases, gates, braai stands, frames)"],
            examples: "Staircases, gates, braai stands, custom steelwork"
        },
        {
            id: 3,
            title: "Fencing",
            icon: "fence",
            description: "Full fencing installations for residential & commercial properties. Professional security solutions.",
            details: ["Palisade fencing", "Concrete Poles installation", "Security Fencing", "Boundary Walls"]
        },
        {
            id: 4,
            title: "Installations",
            icon: "plumbing",
            description: "Professional fixture & structure installation  done right the first time.",
            details: ["Fixtures installation", "Structures assembly", "Fittings & hardware installation"]
        },
        {
            id: 5,
            title: "Home & Office Repairs",
            icon: "home_repair_service",
            description: "Comprehensive repair services for residential & commercial spaces. No job too small, emergency repairs available.",
            details: ["Residential repairs", "Commercial repairs", "Emergency Repairs", "Renovations"]
        },
        {
            id: 6,
            title: "Outdoor Structures",
            icon: "grass",
            description: "Durable outdoor features designed to enhance your property and withstand the elements.",
            details: ["Pergolas", "Carports", "Stoeps (covered patios)", "Paving"]
        }
    ];

    // Value props (Font Awesome remains as requested earlier, these are "google references"? No, but we keep Font Awesome for these per previous design; user only asked to replace emojis)
    const valueProps = [
        { title: "Quality Work", desc: "Every job done with pride and precision. Craftsmanship & attention to detail guaranteed.", iconClass: "fas fa-medal" },
        { title: "Reliable", desc: "We show up on time, every time. Professional and trustworthy service delivery.", iconClass: "fas fa-handshake" },
        { title: "Fair Pricing", desc: "Transparent pricing model, no hidden surprises. Free quotes offered to all customers.", iconClass: "fas fa-tag" },
        { title: "Experienced", desc: "Years of hands-on trade expertise. Skilled workforce with proven track record.", iconClass: "fas fa-briefcase" }
    ];

    const keywords = ["Serving Johannesburg & Gauteng", "Quality Work", "Fair Pricing", "Reliable & On Time", "Free Quotes", "Professional Installations", "Custom Builds", "No Job Too Small"];

    // WhatsApp configuration (updated number)
    const WHATSAPP_NUMBER = "27720438903";  // +27 72 043 8903
    const WHATSAPP_MESSAGE = encodeURIComponent("Hello The Nitty Gritty Handyman! 👋 I would like to request a FREE QUOTE for your handyman services (repairs, steelwork, fencing, installations, etc.). Please could you assist me? Thank you!");
    const WHATSAPP_LINK = `https://wa.me/${WHATSAPP_NUMBER}?text=${WHATSAPP_MESSAGE}`;
    const openWhatsApp = () => window.open(WHATSAPP_LINK, '_blank', 'noopener,noreferrer');

    // Helper to render material icon
    const MaterialIcon = ({ name, className = "" }) => <span className={`material-icons ${className}`}>{name}</span>;

    const Header = ({ currentPage, setCurrentPage }) => {
        const navItems = ["Home", "Services", "About", "Contact"];
        return (
            <nav className="nav-bar">
                {navItems.map(item => (
                    <button key={item} className={`nav-link ${currentPage === item ? "active" : ""}`} onClick={() => setCurrentPage(item)}>
                        {item}
                    </button>
                ))}
            </nav>
        );
    };

    const HomePage = ({ setCurrentPage }) => {
        return (
            <div>
                <div className="hero-section">
                    <h1>The Nitty Gritty Handyman</h1>
                    <p style={{ fontSize: "1.2rem", maxWidth: "800px", margin: "0 auto 1.2rem" }}>
                        Professional maintenance, custom metalwork, fencing & installations  serving <span className="inline-highlight">Johannesburg & Gauteng</span>.
                    </p>
                    <div className="badge-container" style={{ justifyContent: "center" }}>
                        {keywords.slice(0, 5).map(kw => <span key={kw} className="badge">{kw}</span>)}
                    </div>
                    <button onClick={openWhatsApp} style={{ marginTop: "1rem" }}>
                        <MaterialIcon name="chat" /> Get your free quote →
                    </button>
                </div>

                <div className="section-title">
                    <h2>Why choose us?</h2>
                    <p>Our core promises to every client across Johannesburg & Gauteng</p>
                </div>
                <div className="grid-3">
                    {valueProps.map(vp => (
                        <div key={vp.title} className="card value-prop-card">
                            <i className={`${vp.iconClass} value-icon`} aria-hidden="true"></i>
                            <h3>{vp.title}</h3>
                            <p>{vp.desc}</p>
                        </div>
                    ))}
                </div>

                <div className="section-title">
                    <h2>Services we excel at</h2>
                    <p>Comprehensive solutions  residential & commercial</p>
                </div>
                <div className="grid-2">
                    {servicesData.slice(0, 4).map(service => (
                        <div key={service.id} className="card">
                            <div className="service-icon"><MaterialIcon name={service.icon} style={{ fontSize: "2.5rem" }} /></div>
                            <h3>{service.title}</h3>
                            <p>{service.description.substring(0, 100)}...</p>
                            <ul className="service-list">
                                {service.details.slice(0, 2).map((item, idx) => <li key={idx}>{item}</li>)}
                            </ul>
                            <button className="btn" onClick={() => setCurrentPage("Services")} style={{ marginTop: "0.8rem", padding: "0.4rem 1.2rem", fontSize: "0.85rem" }}>
                                Explore all →
                            </button>
                        </div>
                    ))}
                </div>

                <div style={{ background: "var(--accent-bg)", borderRadius: "32px", padding: "2rem", textAlign: "center", margin: "2rem 0" }}>
                    <h3 style={{ marginBottom: "0.5rem" }}><MaterialIcon name="phone_in_talk" style={{ fontSize: "1.5rem", verticalAlign: "middle" }} /> Need a reliable handyman in Gauteng?</h3>
                    <p style={{ marginBottom: "1rem" }}>Free, transparent quotes  no job too small. Custom steel, fencing, repairs, installations.</p>
                    <button onClick={openWhatsApp}><MaterialIcon name="chat" /> Get your free quote →</button>
                </div>

                <div className="badge-container" style={{ justifyContent: "center", marginTop: "1rem" }}>
                    <span className="badge"><MaterialIcon name="location_city" /> Johannesburg</span>
                    <span className="badge"><MaterialIcon name="map" /> Gauteng Province</span>
                    <span className="badge"><MaterialIcon name="emergency" /> Emergency Repairs</span>
                    <span className="badge"><MaterialIcon name="construction" /> Custom Metalwork</span>
                </div>
            </div>
        );
    };

    const ServicesPage = () => {
        return (
            <div>
                <div className="hero-section" style={{ marginBottom: "1rem" }}>
                    <h2>Our Professional Services</h2>
                    <p>Expert craftsmanship across six core categories  serving homes and businesses in Gauteng.</p>
                </div>
                <div className="grid-2">
                    {servicesData.map(service => (
                        <div key={service.id} className="card">
                            <div className="service-icon"><MaterialIcon name={service.icon} style={{ fontSize: "2.5rem" }} /></div>
                            <h3>{service.title}</h3>
                            <p>{service.description}</p>
                            <ul className="service-list">
                                {service.details.map((item, idx) => <li key={idx}>{item}</li>)}
                            </ul>
                            {service.examples && <p style={{ marginTop: "0.5rem", fontStyle: "italic", color: "var(--accent)" }}>✨ {service.examples}</p>}
                            {service.tagline && <div className="badge" style={{ display: "inline-block", marginTop: "0.6rem" }}>{service.tagline}</div>}
                        </div>
                    ))}
                </div>
                <div className="badge-container" style={{ justifyContent: "center", margin: "1.5rem 0" }}>
                    <span className="badge"><MaterialIcon name="check_circle" /> Free Quotes</span>
                    <span className="badge"><MaterialIcon name="handyman" /> Professional Installations</span>
                    <span className="badge"><MaterialIcon name="hourglass_empty" /> No Job Too Small</span>
                    <span className="badge"><MaterialIcon name="precision_manufacturing" /> Custom Builds</span>
                </div>
                <div style={{ textAlign: "center", background: "var(--code-bg)", borderRadius: "28px", padding: "1.5rem", marginTop: "1rem" }}>
                    <h3><MaterialIcon name="assignment" /> Need something specific? Custom steel, fencing, or repairs?</h3>
                    <p>We deliver top-tier work across Johannesburg and the wider Gauteng region. Get in touch for a detailed quote.</p>
                    <button onClick={openWhatsApp} style={{ marginTop: "1rem" }}><MaterialIcon name="chat" /> Get your free quote →</button>
                </div>
            </div>
        );
    };

    const AboutPage = () => {
        return (
            <div>
                <div className="hero-section">
                    <h2>About The Nitty Gritty Handyman</h2>
                    <p>Dedicated to quality, reliability, and fair service since day one.</p>
                </div>
                <div className="card" style={{ marginBottom: "2rem" }}>
                    <h3><MaterialIcon name="location_on" /> Locally rooted in Gauteng</h3>
                    <p>We are a Johannesburg-based handyman and custom metalwork business serving residential and commercial clients across Gauteng. From small household fixes to large-scale steel fabrication, we bring precision, integrity, and a can-do attitude to every project.</p>
                    <p><strong>Our mission:</strong> To provide world-class maintenance, repair, and custom fabrication with transparent pricing and unmatched reliability  ensuring every client feels like a priority.</p>
                </div>

                <div className="grid-2">
                    <div className="card">
                        <h3><MaterialIcon name="lightbulb" /> Our Philosophy</h3>
                        <p>"No job too small"  we treat every task with the same level of dedication. Whether it's a leaky faucet or a custom steel staircase, we take pride in delivering <strong>Quality Work</strong> that lasts.</p>
                        <p><MaterialIcon name="check" /> Free quotes • <MaterialIcon name="schedule" /> Punctuality • <MaterialIcon name="price_check" /> Transparent pricing</p>
                    </div>
                    <div className="card">
                        <h3><MaterialIcon name="military_tech" /> Expertise & Certifications</h3>
                        <p>Years of hands-on experience in welding, fabrication, general maintenance, fencing, and installations. Our skilled team stays updated with best practices to serve Johannesburg and Gauteng effectively.</p>
                        <p><MaterialIcon name="build" /> Specialties: Custom steelwork, stainless steel, palisade fencing, outdoor structures, and emergency repairs.</p>
                    </div>
                </div>

                <div className="contact-info" style={{ textAlign: "center" }}>
                    <h3><MaterialIcon name="public" /> Serving Johannesburg & Gauteng Province</h3>
                    <p>From Sandton to Soweto, Pretoria to the East Rand  we cover the entire region with prompt, professional service. Contact us for a free, no-obligation quote today.</p>
                    <div className="badge-container" style={{ justifyContent: "center" }}>
                        <span className="badge"><MaterialIcon name="rocket_launch" /> Reliable & On Time</span>
                        <span className="badge"><MaterialIcon name="attach_money" /> Fair Pricing</span>
                        <span className="badge"><MaterialIcon name="engineering" /> Experienced Team</span>
                    </div>
                    <button onClick={openWhatsApp} style={{ marginTop: "1.5rem" }}><MaterialIcon name="chat" /> Get your free quote via WhatsApp →</button>
                </div>
            </div>
        );
    };

    const ContactPage = () => {
        const handleSubmit = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const name = formData.get("name");
            alert(`✨ Thanks ${name || "friend"}! We've received your message. A team member will get back to you within 24 hours with a FREE quote. We serve all of Johannesburg & Gauteng!`);
            e.target.reset();
        };

        return (
            <div>
                <div className="hero-section">
                    <h2>Get in Touch</h2>
                    <p>Request a free quote, ask questions, or schedule a service  we respond quickly!</p>
                </div>
                <div className="grid-2">
                    <div className="card">
                        <h3><MaterialIcon name="contact_phone" /> Contact Details</h3>
                        <p><strong>Phone:</strong> <a href="tel:+27111234567">+27 (0) 11 234 5678</a></p>
                        {/* REPLACE EMAIL BELOW WITH ACTUAL BUSINESS EMAIL */}
                        <p><strong>Email:</strong> <a href="mailto:info@nittygrittyhandyman.co.za">info@nittygrittyhandyman.co.za</a>  {/* ← CHANGE TO REAL EMAIL */}</p>
                        <p><strong>Service Area:</strong> Johannesburg & entire Gauteng province (including Pretoria, Midrand, Randburg, Soweto).</p>
                        <p><strong>Hours:</strong> Mon-Fri: 7:00 - 18:00 | Sat: 8:00 - 14:00 (Emergency services available)</p>
                        <hr style={{ margin: "1rem 0", borderColor: "var(--border-color)" }} />
                        <h3><MaterialIcon name="verified" /> Free Quotes & Transparent Pricing</h3>
                        <p>We provide detailed, honest estimates with no hidden fees. Tell us about your project  residential, commercial, steel fabrication, or repairs.</p>
                        <div className="badge-container">
                            <span className="badge"><MaterialIcon name="build" /> No job too small</span>
                            <span className="badge"><MaterialIcon name="bolt" /> Emergency repairs</span>
                            <span className="badge"><MaterialIcon name="fabric" /> Custom steelwork</span>
                        </div>
                        <button onClick={openWhatsApp} style={{ marginTop: "1rem", width: "100%" }}><MaterialIcon name="chat" /> Chat on WhatsApp for instant quote →</button>
                    </div>
                    <div className="card">
                        <h3><MaterialIcon name="edit_note" /> Request a Free Quote (Email Form)</h3>
                        <form onSubmit={handleSubmit}>
                            <input type="text" name="name" placeholder="Full name" required />
                            <input type="email" name="email" placeholder="Email address" required />
                            <input type="tel" name="phone" placeholder="Phone number (optional)" />
                            <textarea name="message" rows="4" placeholder="Describe the job: e.g., leaking tap, custom gate, fencing, pergola, etc." required></textarea>
                            <button type="submit"><MaterialIcon name="send" /> Send & Get Free Quote →</button>
                            <p style={{ fontSize: "0.8rem", marginTop: "0.5rem" }}>We'll respond within 24h. Serving Johannesburg and all Gauteng areas.</p>
                        </form>
                    </div>
                </div>
                <div style={{ textAlign: "center", marginTop: "2rem" }}>
                    <p className="badge" style={{ display: "inline-block" }}><MaterialIcon name="emoji_events" /> "Quality work, fair pricing, reliable service  that's our promise."</p>
                </div>
            </div>
        );
    };

    const App = () => {
        const [currentPage, setCurrentPage] = React.useState("Home");
        const renderPage = () => {
            switch(currentPage) {
                case "Home": return <HomePage setCurrentPage={setCurrentPage} />;
                case "Services": return <ServicesPage />;
                case "About": return <AboutPage />;
                case "Contact": return <ContactPage />;
                default: return <HomePage setCurrentPage={setCurrentPage} />;
            }
        };
        return (
            <>
                <Header currentPage={currentPage} setCurrentPage={setCurrentPage} />
                <main className="app-content">{renderPage()}</main>
                <footer>
